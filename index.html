      rel="stylesheet"
    />
    <title>Signal Force — AI-Powered GovCon Growth Intelligence</title>
    <script>
      // GitHub Pages SPA restore: undo the redirect from 404.html so React
      // Router sees the original path the visitor asked for.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body class="bg-ink-950 text-bone-100 antialiased selection:bg-signal-600/40 selection:text-bone-50">

    <script type="module" src="/src/main.tsx"></script>
  </body>
