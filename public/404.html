<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Signal Force</title>
    <script>
      // GitHub Pages SPA redirect: stash the requested path in the query
      // string and bounce to the app root so BrowserRouter can pick it up.
      // segmentCount = 1 because our app lives at /signal-force/.
      (function (segmentCount) {
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })(1);
    </script>
  </head>
  <body></body>
</html>
